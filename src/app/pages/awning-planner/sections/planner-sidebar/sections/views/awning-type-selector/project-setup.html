<form class="project-setup-form">
  <div class="field-group">
    <label for="ps-customer-name" class="field-label">Customer Name</label>

    <input
      id="ps-customer-name"
      type="text"
      class="field-input"
      placeholder="e.g. John Smith"
      [value]="customerName()"
      (input)="onCustomerNameInput($event)"
    />
  </div>

  <div class="field-group">
    <label for="ps-project-name" class="field-label">Project Name</label>

    <input
      id="ps-project-name"
      type="text"
      class="field-input"
      placeholder="e.g. Smith Residence Patio"
      [value]="projectName()"
      (input)="onProjectNameInput($event)"
    />
  </div>

  <div class="field-group">
    <label for="ps-awning-type" class="field-label">Awning Type</label>

    <select
      id="ps-awning-type"
      class="field-input"
      [value]="selectedType() ?? ''"
      (change)="onTypeChange($event)"
    >
      <option value="" disabled>Select awning type</option>
      <option value="IBR">IBR Awning</option>
      <option value="LOUVER">Louver Awning</option>
    </select>
  </div>

  @if (formValid()) {
    <button
      type="button"
      class="btn btn--primary project-setup-confirm"
      (click)="onConfirm()"
    >
      Confirm Project Setup
    </button>
  }
</form>
