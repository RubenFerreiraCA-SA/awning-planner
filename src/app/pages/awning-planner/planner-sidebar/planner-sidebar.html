<aside
  class="sidebar"
  [class.sidebar--scroll]="!vm.wizardMode()"
  aria-label="Awning Planner Controls"
>
  <app-header-section
    [wizardMode]="vm.wizardMode()"
    (toggleViewMode)="vm.toggleViewMode()"
  />

  @if (vm.wizardMode()) {
    <app-step-progress-section
      [panelDefs]="vm.panelDefs"
      [panelIndex]="vm.panelIndex()"
      (setPanel)="vm.setPanel($event)"
    />

    <app-wizard-panel-section />
    <app-wizard-footer-section />
  } @else {
    <app-scroll-mode-section />
  }
</aside>
